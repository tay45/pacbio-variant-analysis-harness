  <rect x="0" y="0" width="2400" height="1900" fill="#ffffff"/>
  <text class="title" x="1200" y="56">PacBio Variant Analysis Harness: Current Execution Model</text>
  <text class="subtitle" x="1200" y="92">Validation and planning precede local execution or Slurm planning; DeepVariant and pbsv keep separate germline output-validation lineages.</text>

