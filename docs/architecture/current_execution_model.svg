  <text class="text" x="295" y="238">Manifest +</text>
  <text class="text" x="295" y="268">Configuration</text>

  <rect class="box input" x="560" y="205" width="390" height="92"/>
  <text class="text" x="755" y="232">Schema / Identity /</text>
  <text class="text" x="755" y="262">Reference / Preflight</text>
  <text class="text" x="755" y="292">Validation</text>

