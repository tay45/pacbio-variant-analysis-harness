<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1900" viewBox="0 0 2400 1900" role="img" aria-labelledby="title desc">
  <title id="title">PacBio Variant Analysis Harness current execution model</title>
  <desc id="desc">Layered architecture diagram showing manifest and configuration, validation, stage planning, local caller execution or Slurm planned stage entry, separate DeepVariant and pbsv germline validation lineages, GLnexus downstream only of validated DeepVariant gVCFs, somatic integrated evidence downstream of validated DeepSomatic and Severus outputs, and lifecycle controls as a side rail.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4a5a"/>
    </marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 38px; font-weight: 700; fill: #111827; text-anchor: middle; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #4b5563; text-anchor: middle; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #273244; }
      .box { rx: 14; ry: 14; stroke-width: 2.4; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 23px; fill: #18212f; text-anchor: middle; dominant-baseline: middle; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 19px; fill: #344054; text-anchor: middle; dominant-baseline: middle; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #475467; text-anchor: middle; dominant-baseline: middle; }
      .arrow { fill: none; stroke: #3f4a5a; stroke-width: 2.8; marker-end: url(#arrow); }
      .input { fill: #e8f4fd; stroke: #2f6f9f; }
      .planning { fill: #eef7ec; stroke: #3b7d3a; }
      .backend { fill: #fff4d6; stroke: #a16a00; }
      .entry { fill: #fffaf0; stroke: #b7791f; }
      .germline { fill: #f1ecff; stroke: #6a4fb3; }
      .somatic { fill: #ffecec; stroke: #b34f4f; }
      .validation { fill: #eaf7f4; stroke: #2e7d70; }
      .lifecycle { fill: #f7f7f8; stroke: #667085; }
      .lane { fill: #fbfbfd; stroke: #d9dee8; stroke-width: 1.6; }
      .germline-lane { fill: #fbf9ff; stroke: #ddd4ff; stroke-width: 1.8; }
      .somatic-lane { fill: #fffafa; stroke: #ffd3d3; stroke-width: 1.8; }
      .cohort-lane { fill: #f7f4ff; stroke: #d9cfff; stroke-width: 1.8; }
      .sv-lane { fill: #fbf9ff; stroke: #d8d0ff; stroke-width: 1.4; stroke-dasharray: 7 6; }
    </style>
