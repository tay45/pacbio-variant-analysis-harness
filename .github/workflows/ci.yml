name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run hermetic tests
        run: python scripts/run_tests.py -q
      - name: Verify pytest exits cleanly
        run: python scripts/verify_pytest_exit.py
      - name: Run public package audit
        run: python scripts/audit_public_repository.py
